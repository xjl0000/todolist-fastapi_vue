
services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: todolist-backend
    restart: always # 容器重启后自动启动
    volumes:
      # 挂载SQLite数据库文件：容器里的/app/data映射到宿主机的./data
      # 这样容器重启数据不会丢，且不会覆盖容器内的应用代码
      - ./data:/app/data
    networks:
      - todolist-network

  # 前端服务（包含Nginx）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: todolist-frontend
    restart: always
    ports:
      - "80:80" # 宿主机80端口映射到容器80端口
    depends_on:
      - backend # 等后端启动后再启动前端
    networks:
      - todolist-network

# 自定义网络，让前端和后端能通过服务名互相访问
networks:
  todolist-network:
    driver: bridge
